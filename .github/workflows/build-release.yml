name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build-cmd: npm run build:linux
            artifact: dist/*.AppImage
            artifact-name: budgetpulse-linux-*.AppImage
          - os: macos-latest
            build-cmd: npm run build:mac
            artifact: dist/*.dmg
            artifact-name: budgetpulse-mac-*.dmg
          - os: windows-latest
            build-cmd: npm run build:win
            artifact: dist/*.exe
            artifact-name: budgetpulse-windows-*.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: ${{ matrix.build-cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.artifact }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist-all

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./dist-all -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" \) -exec mv {} ./release-assets/ \;
          ls -lh ./release-assets/

      - name: Delete old release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          files: ./release-assets/*
          body: "Built from commit ${{ github.sha }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
